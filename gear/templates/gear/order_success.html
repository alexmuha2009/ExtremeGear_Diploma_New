{% extends "gear/base.html" %}

{% block title %}Замовлення прийнято!{% endblock %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: 65vh; padding: 40px 0;">

    <div style="background: var(--dark2); border: 1.5px solid rgba(174,221,0,0.3); border-radius: var(--radius-lg); padding: 56px 48px; text-align: center; max-width: 560px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(174,221,0,0.06); position: relative; overflow: hidden;">

        <!-- Фоновий акцент -->
        <div style="position: absolute; top: -60px; right: -60px; width: 200px; height: 200px; background: radial-gradient(circle, rgba(174,221,0,0.08) 0%, transparent 70%); pointer-events: none;"></div>
        <div style="position: absolute; bottom: -60px; left: -60px; width: 200px; height: 200px; background: radial-gradient(circle, rgba(174,221,0,0.05) 0%, transparent 70%); pointer-events: none;"></div>

        <!-- Іконка -->
        <div style="width: 80px; height: 80px; background: rgba(174,221,0,0.12); border: 2px solid rgba(174,221,0,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 28px auto; animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);">
            <i class="bi bi-check-lg" style="font-size: 2.4rem; color: var(--acid);"></i>
        </div>

        <!-- Тег -->
        <div style="display: inline-block; background: var(--acid); color: var(--black); font-family: 'Anton', sans-serif; font-size: 0.7rem; letter-spacing: 3px; padding: 4px 14px; border-radius: 20px; margin-bottom: 18px;">
            УСПІШНО
        </div>

        <!-- Заголовок -->
        <h1 style="font-family: 'Russo One', sans-serif; font-size: 2.4rem; letter-spacing: 2px; text-transform: uppercase; color: var(--white); margin-bottom: 16px; line-height: 1.1;">
            Замовлення<br><span style="color: var(--acid);">прийнято!</span>
        </h1>

        <!-- Розділювач -->
        <div style="height: 1px; background: linear-gradient(90deg, transparent, rgba(174,221,0,0.3), transparent); margin: 20px 0;"></div>

        <!-- Текст -->
        <p style="font-family: 'Barlow', sans-serif; font-size: 1rem; color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 32px;">
            Дякуємо за покупку. Наш менеджер вже отримав заявку і зв'яжеться з вами протягом <span style="color: var(--acid); font-weight: 700;">15 хвилин</span> для уточнення деталей доставки.
        </p>

        <!-- Кнопка -->
        <a href="/" style="display: block; background: var(--acid); color: var(--black); font-family: 'Anton', sans-serif; font-size: 1rem; letter-spacing: 3px; padding: 16px; text-decoration: none; border-radius: var(--radius-sm); text-transform: uppercase; transition: all 0.2s; box-shadow: 0 4px 20px rgba(174,221,0,0.25);" onmouseover="this.style.background='#fff'; this.style.transform='translateY(-2px)'" onmouseout="this.style.background='var(--acid)'; this.style.transform='translateY(0)'">
            ← Повернутися до магазину
        </a>

    </div>
</div>

<style>
    @keyframes popIn {
        from { transform: scale(0.5); opacity: 0; }
        to   { transform: scale(1); opacity: 1; }
    }
</style>
{% endblock %}
