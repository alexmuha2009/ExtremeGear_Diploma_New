{% extends "gear/base.html" %}

{% block title %}Вхід - Extreme Gear{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">

        <div class="auth-logo-line"></div>

        <div class="auth-tag">🔐 Авторизація</div>
        <h1 class="auth-title">ВХІД ДО<br><span>СИСТЕМИ</span></h1>

        {% if messages %}
            {% for message in messages %}
                <div class="alert-danger">
                    <i class="bi bi-exclamation-triangle-fill"></i> {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="auth-input-group">
                <label>Логін</label>
                <div class="input-wrap">
                    <i class="bi bi-person"></i>
                    <input type="text" name="username" required placeholder="Введіть логін">
                </div>
            </div>

            <div class="auth-input-group">
                <label>Пароль</label>
                <div class="input-wrap">
                    <i class="bi bi-key"></i>
                    <input type="password" name="password" required placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="auth-submit-btn">
                <i class="bi bi-box-arrow-in-right me-2"></i> Увійти
            </button>
        </form>

        <div class="auth-footer">
            Немає акаунту? <a href="{% url 'register' %}">Створити зараз</a>
        </div>
    </div>
</div>

<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        padding: 40px 20px;
    }

   .auth-card {
        background: var(--dark2);
        border: 1.5px solid rgba(174,221,0,0.25);
        border-radius: var(--radius-lg);
        box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(174,221,0,0.04);
        width: 100%;
        max-width: 420px;
        padding: 40px 36px 36px;
        position: relative;
        overflow: hidden;
        animation: cardAppear 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .auth-logo-line {
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: 4px;
        background: linear-gradient(180deg, var(--acid), var(--neon-orange), var(--neon-pink));
        border-radius: var(--radius-lg) 0 0 var(--radius-lg);
    }

    .auth-tag {
        display: inline-block;
        background: var(--acid);
        color: var(--black);
        font-family: 'Anton', sans-serif;
        font-size: 0.75rem;
        letter-spacing: 3px;
        padding: 4px 14px;
        border-radius: 20px;
        margin-bottom: 14px;
    }

    .auth-title {
        font-family: 'Russo One', sans-serif;
        font-size: 2.4rem;
        letter-spacing: 3px;
        color: var(--white);
        margin-bottom: 28px;
        line-height: 1.1;
        text-transform: uppercase;
    }

    .auth-title span {
        color: var(--acid);
        text-shadow: 0 0 30px rgba(174,221,0,0.4);
    }

    .alert-danger {
        background: rgba(255,77,77,0.1);
        color: #ff6b6b;
        border: 1.5px solid rgba(255,77,77,0.3);
        padding: 12px 16px;
        border-radius: var(--radius-sm);
        margin-bottom: 20px;
        font-family: 'Barlow Condensed', sans-serif;
        font-weight: 700;
        font-size: 0.9rem;
        letter-spacing: 1px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .auth-input-group {
        margin-bottom: 18px;
    }

    .auth-input-group label {
        display: block;
        font-family: 'Barlow Condensed', sans-serif;
        font-weight: 700;
        font-size: 0.75rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--gray);
        margin-bottom: 7px;
    }

    .input-wrap {
        display: flex;
        align-items: center;
        background: var(--dark3);
        border: 1.5px solid var(--gray2);
        border-radius: var(--radius-sm);
        overflow: hidden;
        transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap:focus-within {
        border-color: var(--acid);
        box-shadow: 0 0 0 3px var(--acid-glow);
    }

    .input-wrap i {
        padding: 0 14px;
        color: var(--acid);
        font-size: 1rem;
        flex-shrink: 0;
    }

    .input-wrap input {
        background: transparent;
        border: none;
        outline: none;
        color: var(--white);
        padding: 12px 14px 12px 0;
        width: 100%;
        font-family: 'Barlow', sans-serif;
        font-size: 0.95rem;
    }

    .input-wrap input::placeholder {
        color: var(--gray);
    }

    .auth-submit-btn {
        background: var(--acid);
        color: var(--black);
        border: none;
        width: 100%;
        padding: 15px;
        border-radius: var(--radius-sm);
        font-family: 'Anton', sans-serif;
        font-size: 1.05rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 8px;
        box-shadow: 0 4px 20px rgba(174,221,0,0.22);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .auth-submit-btn:hover {
        background: var(--white);
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(174,221,0,0.18);
    }

    .auth-footer {
        margin-top: 22px;
        text-align: center;
        color: var(--gray);
        font-size: 0.9rem;
    }

    .auth-footer a {
        color: var(--acid);
        font-weight: 700;
        text-decoration: none;
        transition: color 0.2s;
    }

   .auth-footer a:hover { color: var(--white); }

    .input-wrap input:-webkit-autofill,
    .input-wrap input:-webkit-autofill:hover,
    .input-wrap input:-webkit-autofill:focus {
        -webkit-box-shadow: 0 0 0px 1000px var(--dark3) inset !important;
        -webkit-text-fill-color: var(--white) !important;
        caret-color: var(--white);
    }

    @keyframes cardAppear {
        0%   { opacity: 0; transform: translateY(30px) scale(0.97); filter: brightness(0); }
        60%  { filter: brightness(0.5); }
        100% { opacity: 1; transform: translateY(0) scale(1); filter: brightness(1); }
    }
</style>
{% endblock %}
