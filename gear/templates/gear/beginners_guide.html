{% extends 'gear/base.html' %}

{% block title %}PRO Калькулятор - Extreme Gear{% endblock %}

{% block content %}
<div class="container" style="max-width: 1100px !important; margin: 40px auto; padding: 0 20px;">
    
    <div style="background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.4);">
        
        <div style="background: #ff4500; padding: 30px; color: white; text-align: center;">
            <h2 style="margin: 0; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;">
                ⛰️ PRO КАЛЬКУЛЯТОР СПОРЯДЖЕННЯ
            </h2>
        </div>

        <form style="padding: 40px;" action="" method="POST">
            {% csrf_token %}

            <div style="margin-bottom: 40px;">
                <label style="display: block; font-weight: 800; text-transform: uppercase; font-size: 0.9rem; color: #111; margin-bottom: 20px; border-left: 5px solid #ff4500; padding-left: 10px;">
                    ⛷️ ОБЕРІТЬ ВАШ НАПРЯМОК
                </label>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px;">
                    
                    <label class="sport-card-input">
                        <input type="radio" name="sport_type" value="ski" checked>
                        <div class="sport-ui">
                            <span style="font-size: 2.5rem; display: block;">⛷️</span>
                            <span style="font-weight: 800;">ЛИЖІ</span>
                        </div>
                    </label>

                    <label class="sport-card-input">
                        <input type="radio" name="sport_type" value="snowboard">
                        <div class="sport-ui">
                            <span style="font-size: 2.5rem; display: block;">🏂</span>
                            <span style="font-weight: 800;">СНОУБОРД</span>
                        </div>
                    </label>

                    <label class="sport-card-input">
                        <input type="radio" name="sport_type" value="motocross">
                        <div class="sport-ui">
                            <span style="font-size: 2.5rem; display: block;">🏍️</span>
                            <span style="font-weight: 800;">МОТОКРОС</span>
                        </div>
                    </label>

                    <label class="sport-card-input">
                        <input type="radio" name="sport_type" value="climbing">
                        <div class="sport-ui">
                            <span style="font-size: 2.5rem; display: block;">🧗</span>
                            <span style="font-weight: 800;">АЛЬПІНІЗМ</span>
                        </div>
                    </label>
                </div>
            </div>

            <hr style="border: none; border-top: 1px solid #eee; margin-bottom: 35px;">

            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 25px; margin-bottom: 35px;">
                <div>
                    <label style="display: block; margin-bottom: 10px; font-weight: 700;">Стать</label>
                    <select name="gender" style="width: 100%; padding: 15px; border: 2px solid #f0f0f0; border-radius: 8px;">
                        <option>Чоловік</option>
                        <option>Жінка</option>
                    </select>
                </div>
                <div>
                    <label style="display: block; margin-bottom: 10px; font-weight: 700;">Зріст (см)</label>
                    <input type="number" name="height" value="180" style="width: 100%; padding: 15px; border: 2px solid #f0f0f0; border-radius: 8px;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 10px; font-weight: 700;">Вага (кг)</label>
                    <input type="number" name="weight" value="75" style="width: 100%; padding: 15px; border: 2px solid #f0f0f0; border-radius: 8px;">
                </div>
            </div>

            <button type="submit" style="width: 100%; background: #ff4500; color: white; border: none; padding: 25px; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s;">
                🚀 РОЗРАХУВАТИ ПОВНИЙ КОМПЛЕКТ
            </button>
        </form>
    </div>
</div>

<style>
    .sport-card-input { cursor: pointer; width: 100%; }
    .sport-card-input input { display: none; }
    .sport-ui {
        border: 2px solid #f0f0f0;
        padding: 25px;
        border-radius: 12px;
        text-align: center;
        transition: 0.3s;
        background: #fff;
    }
    .sport-card-input input:checked + .sport-ui {
        border-color: #ff4500 !important;
        background: #fff8f5 !important;
        transform: translateY(-5px);
    }
</style>
{% endblock %}
