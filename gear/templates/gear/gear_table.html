{% extends 'gear/base.html' %}

{% block title %}PRO Підбір{% endblock %}

{% block content %}
<style>
    .calc-wrapper {
        position: relative;
        min-height: 90vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 10px 0 80px;
    }

    .page-bg-fixed {
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
    }
    .page-bg-fixed .bg-tile {
        background-size: cover;
        background-position: center;
        filter: brightness(0.28) saturate(1.6);
    }
    .page-bg-fixed .bg-tile:nth-child(1) {
        background-image: url('https://images.unsplash.com/photo-1522163182402-834f871fd851?w=900&q=80');
    }
    .page-bg-fixed .bg-tile:nth-child(2) {
        background-image: url('https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=900&q=80');
    }
    .page-bg-fixed .bg-tile:nth-child(3) {
        background-image: url('https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?w=900&q=80');
    }
    .page-bg-fixed .bg-tile:nth-child(4) {
        background-image: url('https://images.unsplash.com/photo-1547447134-cd3f5c716030?w=900&q=80');
    }

    .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--gray);
        text-decoration: none;
        font-family: 'Barlow Condensed', sans-serif;
        font-weight: 700;
        font-size: 0.82rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 20px;
        transition: color 0.2s;
        padding: 8px 0;
    }
    .back-btn:hover { color: var(--acid); }
    .back-btn i { font-size: 1rem; }

    .calc-card {
        position: relative; z-index: 2;
        width: 100%; max-width: 820px;
        background: rgba(19,19,19,0.97);
        border: 1.5px solid var(--gray2);
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: 0 24px 80px rgba(0,0,0,0.7);
    }

    .calc-header {
        padding: 32px 40px;
        background: linear-gradient(135deg, rgba(204,255,0,0.12) 0%, rgba(255,107,0,0.08) 100%);
        border-bottom: 1.5px solid rgba(204,255,0,0.2);
        text-align: center;
        position: relative; overflow: hidden;
    }
    .calc-header::before {
        content: 'PRO';
        position: absolute; top: -10px; right: -10px;
        font-family: 'Bebas Neue', sans-serif;
        font-size: 8rem; color: rgba(204,255,0,0.04);
        letter-spacing: 10px; pointer-events: none; line-height: 1;
    }
    .calc-header-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 2rem; letter-spacing: 5px;
        color: var(--white); text-transform: uppercase;
        display: flex; align-items: center; justify-content: center; gap: 12px;
    }
    .calc-header-title span { color: var(--acid); }

    .calc-body { padding: 36px 40px; }

    .calc-section-label {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 0.95rem; letter-spacing: 3px;
        color: var(--acid); text-transform: uppercase;
        margin-bottom: 18px;
        display: flex; align-items: center; gap: 10px;
    }
    .calc-section-label::after {
        content: ''; flex: 1; height: 1px;
        background: linear-gradient(90deg, var(--gray2), transparent);
    }

    .calc-row { display: grid; gap: 16px; margin-bottom: 28px; }
    .calc-row.cols-2 { grid-template-columns: 2fr 1fr; }
    .calc-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .calc-row.cols-1 { grid-template-columns: 1fr; }

    .calc-field label {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 0.75rem; letter-spacing: 2px;
        text-transform: uppercase; font-weight: 700;
        color: var(--gray); display: block; margin-bottom: 8px;
    }

    .calc-select, .calc-input {
        width: 100%;
        background: var(--dark3) !important;
        border: 1.5px solid var(--gray2) !important;
        border-radius: var(--radius-sm) !important;
        color: var(--white) !important;
        padding: 13px 16px;
        font-family: 'Barlow', sans-serif;
        font-size: 1rem;
        transition: border-color 0.2s, box-shadow 0.2s;
        outline: none; -webkit-appearance: none;
    }
    .calc-select:focus, .calc-input:focus {
        border-color: var(--acid) !important;
        box-shadow: 0 0 0 3px rgba(204,255,0,0.12) !important;
    }
    .calc-select option { background: var(--dark2); color: var(--white); }
    .calc-input::placeholder { color: var(--gray); }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }
    input[type=number] { -moz-appearance: textfield; }

    .temp-box {
        background: rgba(204,255,0,0.04);
        border: 1.5px solid rgba(204,255,0,0.18);
        border-radius: var(--radius);
        padding: 24px 20px;
        margin-bottom: 28px;
    }
    .temp-box-header {
        display: flex; justify-content: space-between; align-items: center;
        margin-bottom: 16px;
    }
    .temp-label {
        font-family: 'Barlow Condensed', sans-serif;
        font-weight: 700; font-size: 1rem;
        letter-spacing: 1px; color: var(--white);
    }
    .temp-value {
        background: var(--acid); color: var(--black);
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.1rem; letter-spacing: 2px;
        padding: 4px 14px; border-radius: 20px;
        transition: all 0.15s;
    }
    input[type=range].calc-range {
        -webkit-appearance: none;
        width: 100%; height: 4px;
        background: var(--gray2);
        border-radius: 2px; outline: none; cursor: pointer;
        border: none !important;
        padding: 0 !important; box-shadow: none !important;
    }
    input[type=range].calc-range::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 20px; height: 20px;
        background: var(--acid); border-radius: 50%;
        cursor: pointer; transition: transform 0.15s;
        box-shadow: 0 0 8px rgba(204,255,0,0.4);
    }
    input[type=range].calc-range::-webkit-slider-thumb:hover { transform: scale(1.3); }

    .btn-calculate {
        width: 100%; padding: 18px;
        background: var(--acid); color: var(--black);
        border: none; border-radius: var(--radius-sm);
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.4rem; letter-spacing: 4px;
        cursor: pointer; transition: all 0.25s;
        text-transform: uppercase;
        box-shadow: 0 4px 24px rgba(204,255,0,0.25);
        display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-calculate:hover {
        background: var(--white); transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(255,255,255,0.15);
    }
    .btn-calculate:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .result-box {
        display: none;
        background: var(--dark3);
        border-top: 2px solid rgba(204,255,0,0.2);
        padding: 40px;
    }
    .result-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.6rem; letter-spacing: 5px;
        color: var(--acid); text-align: center;
        margin-bottom: 28px;
    }
    .result-stats {
        display: grid; grid-template-columns: 1fr 1fr;
        gap: 14px; margin-bottom: 36px;
    }
    .result-stat-card {
        background: rgba(204,255,0,0.05);
        border: 1.5px solid rgba(204,255,0,0.15);
        border-radius: var(--radius);
        padding: 20px; text-align: center;
    }
    .result-stat-label {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 0.75rem; letter-spacing: 2px;
        text-transform: uppercase; color: var(--gray); margin-bottom: 8px;
    }
    .result-stat-value {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 2.5rem; letter-spacing: 3px; color: var(--acid); line-height: 1;
    }
    .result-stat-sub { font-size: 0.82rem; color: rgba(255,255,255,0.5); margin-top: 6px; }

    .products-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.1rem; letter-spacing: 3px;
        color: var(--acid); text-align: center;
        margin-bottom: 20px; display: flex;
        align-items: center; justify-content: center; gap: 12px;
    }
    .products-title::before, .products-title::after {
        content: ''; flex: 1; height: 1px;
        background: rgba(204,255,0,0.15);
    }

    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }

    .product-mini-card {
        background: var(--dark2);
        border: 1.5px solid var(--gray2);
        border-radius: var(--radius);
        padding: 16px;
        text-decoration: none; color: var(--white);
        transition: all 0.25s;
        display: flex; flex-direction: column; align-items: center; text-align: center;
    }
    .product-mini-card:hover {
        border-color: var(--acid); color: var(--white);
        transform: translateY(-3px);
        box-shadow: 0 8px 24px rgba(204,255,0,0.1);
    }
    .product-mini-img {
        width: 100%; height: 120px;
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 12px; overflow: hidden;
    }
    .product-mini-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .product-mini-brand {
        font-size: 0.68rem; letter-spacing: 2px; color: var(--acid);
        text-transform: uppercase; font-weight: 700; margin-bottom: 4px;
    }
    .product-mini-name {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 0.85rem; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.5px;
        line-height: 1.3; margin-bottom: 8px;
        max-height: 2.6em; overflow: hidden;
    }
    .product-mini-price {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.2rem; letter-spacing: 1px; color: var(--acid);
        margin-top: auto;
    }

    @media (max-width: 768px) {
        .calc-body { padding: 24px 20px; }
        .result-box { padding: 24px 20px; }
        .calc-row.cols-2, .calc-row.cols-3 { grid-template-columns: 1fr; }
        .result-stats { grid-template-columns: 1fr; }
        .calc-header { padding: 24px 20px; }
        .products-grid { grid-template-columns: repeat(2, 1fr); }
    }
</style>

<div class="page-bg-fixed"><div class="bg-tile"></div><div class="bg-tile"></div><div class="bg-tile"></div><div class="bg-tile"></div></div>

<a href="javascript:history.back()" class="back-btn">
    <i class="bi bi-arrow-left"></i> Назад
</a>

<div class="calc-wrapper">
    <div class="calc-card">

        <div class="calc-header">
            <div class="calc-header-title">
                <i class="bi bi-calculator-fill" style="color: var(--acid); font-size: 1.6rem;"></i>
                PRO <span>Калькулятор</span> спорядження
            </div>
        </div>

        <div class="calc-body">

            <div class="calc-section-label">
                <i class="bi bi-globe2"></i> Деталі напрямку
            </div>

            <div class="calc-row cols-2">
                <div class="calc-field">
                    <label>Вид спорту</label>
                    <select id="userSport" class="calc-select">
                        <option value="">Оберіть напрямок...</option>
                        {% for sport in sports %}
                            <option value="{{ sport.id }}">{{ sport.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="calc-field">
                    <label>Тривалість (днів)</label>
                    <input type="number" id="duration" class="calc-input" placeholder="5"
                           oninput="this.value=this.value.replace(/[^0-9]/g,''); if(parseInt(this.value)<=0||this.value==='')this.value='';">
                </div>
            </div>

            <div class="calc-section-label">
                <i class="bi bi-person-fill"></i> Ваші параметри
            </div>

            <div class="calc-row cols-3">
                <div class="calc-field">
                    <label>Стать</label>
                    <select id="userGender" class="calc-select">
                        <option value="male">Чоловік</option>
                        <option value="female">Жінка</option>
                        <option value="child">Дитина</option>
                    </select>
                </div>
                <div class="calc-field">
                    <label>Ріст (см)</label>
                    <input type="number" id="userHeight" class="calc-input" placeholder="180"
                           oninput="this.value=this.value.replace(/[^0-9]/g,''); if(parseInt(this.value)<=0||this.value==='')this.value='';">
                </div>
                <div class="calc-field">
                    <label>Вага (кг)</label>
                    <input type="number" id="userWeight" class="calc-input" placeholder="75"
                           oninput="this.value=this.value.replace(/[^0-9]/g,''); if(parseInt(this.value)<=0||this.value==='')this.value='';">
                </div>
            </div>

            <div class="temp-box">
                <div class="temp-box-header">
                    <span class="temp-label"><i class="bi bi-thermometer-half" style="color: var(--acid); margin-right: 8px;"></i> Температура</span>
                    <span class="temp-value" id="tempValue">-5°C</span>
                </div>
                <input type="range" class="calc-range" min="-30" max="20" step="1" id="weatherTemp" value="-5"
                       oninput="updateTemp(this.value)">
            </div>

            <button id="calcBtn" onclick="calculateGear()" class="btn-calculate">
                <i class="bi bi-send-fill"></i> Розрахувати комплект
            </button>
        </div>

        <div id="resultBox" class="result-box">
            <div class="result-title">🎯 Ваш результат</div>
            <div class="result-stats" style="grid-template-columns: 1fr;">
                <div class="result-stat-card">
                    <div class="result-stat-label">💡 Поради щодо спорядження</div>
                    <div id="resClothInfo" style="font-size: 1rem; color: rgba(255,255,255,0.85); line-height: 1.7; margin-top: 10px; text-align: left;">—</div>
                </div>
            </div>

            <div class="products-title">
                <i class="bi bi-bag-fill"></i> Підібране спорядження
            </div>
            <div class="products-grid" id="recommendedProducts"></div>
        </div>

    </div>
</div>

<script>
    function updateTemp(val) {
        const display = document.getElementById('tempValue');
        display.textContent = val + '°C';
        if (val < -10) display.style.background = '#4fc3f7';
        else if (val < 0) display.style.background = 'var(--acid)';
        else display.style.background = '#ff6b00';
    }

    function setError(el) {
        el.style.borderColor = '#ff4d4d';
        el.style.boxShadow = '0 0 0 3px rgba(255,77,77,0.2)';
    }

    function clearError(el) {
        el.style.borderColor = '';
        el.style.boxShadow = '';
    }

    function calculateGear() {
        const sportEl  = document.getElementById('userSport');
        const heightEl = document.getElementById('userHeight');
        const weightEl = document.getElementById('userWeight');
        const btn      = document.getElementById('calcBtn');

        const sport_id = sportEl.value;
        const h        = parseInt(heightEl.value);
        const w        = parseInt(weightEl.value);

        let hasError = false;
        [sportEl, heightEl, weightEl].forEach(el => clearError(el));

        if (!sport_id) { setError(sportEl); hasError = true; }
        if (!heightEl.value || isNaN(h) || h <= 0 || h > 250) { setError(heightEl); hasError = true; }
        if (!weightEl.value || isNaN(w) || w <= 0 || w > 200) { setError(weightEl); hasError = true; }

        if (hasError) return;

        btn.disabled = true;
        btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Підбираю комплект...';

        fetch('/api/calculate-gear/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                height: h, weight: w,
                temp: document.getElementById('weatherTemp').value,
                sport_id: sport_id
            })
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('resClothInfo').innerText = data.cloth_info;

            let prodBox = document.getElementById('recommendedProducts');
            prodBox.innerHTML = "";

            data.products.forEach(p => {
                prodBox.innerHTML += `
                    <a href="/gear/${p.id}/" class="product-mini-card">
                        <div class="product-mini-img">
                            <img src="${p.image_url}" alt="${p.name}">
                        </div>
                        <div class="product-mini-brand">${p.brand}</div>
                        <div class="product-mini-name">${p.name}</div>
                        <div class="product-mini-price">${p.price} ₴</div>
                    </a>`;
            });

            const resultBox = document.getElementById('resultBox');
            resultBox.style.display = 'block';
            resultBox.scrollIntoView({ behavior: "smooth", block: "start" });

            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-send-fill"></i> Розрахувати комплект';
        })
        .catch(() => {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-send-fill"></i> Розрахувати комплект';
        });
    }
</script>
{% endblock %}
