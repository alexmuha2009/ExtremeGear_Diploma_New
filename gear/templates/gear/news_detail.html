{% extends 'gear/base.html' %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <a href="{% url 'news' %}" class="btn btn-light mb-4">← Повернутися до новин</a>
            
            <h1 class="display-5 fw-bold mb-3">{{ news_item.title }}</h1>
            
            <p class="text-muted mb-4 border-bottom pb-3">
                Опубліковано: {{ news_item.created_at|date:"d E Y" }}
            </p>

            {% if news_item.image %}
                <img src="{{ news_item.image.url }}" class="img-fluid rounded mb-4 w-100 shadow-sm" alt="{{ news_item.title }}">
            {% endif %}

            <div class="news-content" style="font-size: 1.15rem; line-height: 1.8; color: #333;">
                {{ news_item.content|linebreaks }}
            </div>
        </div>
    </div>
</div>
{% endblock %}
